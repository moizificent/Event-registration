<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Registration</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left,#2b2b8f,#1a1640,#0d0b2a);
    color:white;
}

.container{
    width:500px;
    padding:40px;
    border:1px solid rgba(255,255,255,0.3);
    border-radius:20px;
    backdrop-filter: blur(10px);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:14px;
    margin-bottom:30px;
    color:#ddd;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

input, select{
    width:100%;
    padding:10px;
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.5);
    color:white;
    font-size:14px;
}

input::placeholder{
    color:#ccc;
}

.name-row{
    display:flex;
    gap:20px;
}

.name-row input{
    width:100%;
}

button{
    display:block;
    margin:30px auto 0;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    font-size:16px;
    color:white;
    cursor:pointer;
    background:linear-gradient(45deg,#ff3c8e,#ff2e63);
}

button:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>Event Registration</h1>
<p class="subtitle">Register with us to get more details.</p>

<form>

<div class="form-group">
<label>Name</label>
<div class="name-row">
<input type="text" placeholder="First" required>
<input type="text" placeholder="Last" required>
</div>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" placeholder="Enter phone number">
</div>

<div class="form-group">
<label>Topic</label>
<select>
<option>Select topic</option>
<option>Web Development</option>
<option>UI/UX Design</option>
<option>AI & Machine Learning</option>
</select>
</div>

<div class="form-group">
<label>Preferred Slot</label>
<select>
<option>Select slot</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>
</div>

<button type="submit">Sign me up</button>

</form>

</div>

</body>
</html>
